<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LawnMaster Pro - Premium Lawnmowers</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <nav class="navbar">
      <div class="nav-container">
        <div class="logo">
          <h2> LawnMaster Pro</h2>
        </div>
        <div class="nav-menu">
          <div id="cartBtn" class="btn btn-primary">🛒 Cart (0)</div>
        </div>
      </div>
    </nav>
  </header>

  <main>
    <!-- Checkout Modal (Guest) -->
    <div id="checkoutModal" class="modal">
      <div class="modal-content">
        <span class="close-checkout">&times;</span>
        <h3>Checkout</h3>
        <form id="checkoutForm">
          <input type="text" id="customerName" placeholder="Full Name" required>
          <input type="email" id="customerEmail" placeholder="Email" required>
          <button type="submit" class="btn btn-success" id="submitOrder">Place Order</button>
        </form>
        <p id="orderStatus"></p>
      </div>
    </div>

    <!-- Products Grid -->
    <section class="products-section">
      <div class="container">
        <h1>Premium Lawnmowers</h1>
        <p class="subtitle">Choose the perfect mower for your lawn</p>
        <div id="productsGrid" class="products-grid">
          <!-- Products will be injected here -->
        </div>
      </div>
    </section>

    <!-- Cart Sidebar -->
    <div id="cartSidebar" class="cart-sidebar">
      <div class="cart-header">
        <h3>Shopping Cart</h3>
        <span class="close-cart">&times;</span>
      </div>
      <div id="cartItems" class="cart-items">
        <!-- Cart items will be injected here -->
      </div>
      <div class="cart-footer">
        <div class="cart-total">
          <strong>Total: $<span id="cartTotal">0.00</span></strong>
        </div>
        <button id="checkoutBtn" class="btn btn-success" style="display: none;">Checkout</button>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
